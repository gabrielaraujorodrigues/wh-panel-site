kind = "web"
previewPath = "/"
title = "WhatsApp Bot Panel"
version = "1.0.0"
id = "artifacts/bot-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23571

[services.development]
run = "pnpm --filter @workspace/bot-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bot-panel", "run", "build" ]
publicDir = "artifacts/bot-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23571"
BASE_PATH = "/"
